<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 9" width="32" height="32">
  <rect width="10" height="9" fill="#111"/>
  <!-- head (white) -->
  <rect x="5" y="0" width="1" height="1" fill="#fff"/>
  <rect x="6" y="0" width="1" height="1" fill="#fff"/>
  <!-- eye + head -->
  <rect x="3" y="1" width="1" height="1" fill="#222"/>
  <rect x="4" y="1" width="1" height="1" fill="#fff"/>
  <rect x="5" y="1" width="1" height="1" fill="#fff"/>
  <rect x="6" y="1" width="1" height="1" fill="#fff"/>
  <!-- beak + chest + body -->
  <rect x="2" y="2" width="1" height="1" fill="#FFB800"/>
  <rect x="3" y="2" width="1" height="1" fill="#fff"/>
  <rect x="4" y="2" width="1" height="1" fill="#fff"/>
  <rect x="5" y="2" width="1" height="1" fill="#fff"/>
  <rect x="6" y="2" width="1" height="1" fill="#8B5E3C"/>
  <!-- chest + body -->
  <rect x="4" y="3" width="1" height="1" fill="#fff"/>
  <rect x="5" y="3" width="1" height="1" fill="#8B5E3C"/>
  <rect x="6" y="3" width="1" height="1" fill="#8B5E3C"/>
  <rect x="7" y="3" width="1" height="1" fill="#8B5E3C"/>
  <!-- body wide -->
  <rect x="3" y="4" width="1" height="1" fill="#8B5E3C"/>
  <rect x="4" y="4" width="1" height="1" fill="#8B5E3C"/>
  <rect x="5" y="4" width="1" height="1" fill="#8B5E3C"/>
  <rect x="6" y="4" width="1" height="1" fill="#8B5E3C"/>
  <rect x="7" y="4" width="1" height="1" fill="#8B5E3C"/>
  <rect x="8" y="4" width="1" height="1" fill="#8B5E3C"/>
  <!-- body -->
  <rect x="4" y="5" width="1" height="1" fill="#8B5E3C"/>
  <rect x="5" y="5" width="1" height="1" fill="#8B5E3C"/>
  <rect x="6" y="5" width="1" height="1" fill="#8B5E3C"/>
  <rect x="7" y="5" width="1" height="1" fill="#8B5E3C"/>
  <rect x="8" y="5" width="1" height="1" fill="#8B5E3C"/>
  <!-- body + white tail -->
  <rect x="5" y="6" width="1" height="1" fill="#8B5E3C"/>
  <rect x="6" y="6" width="1" height="1" fill="#8B5E3C"/>
  <rect x="7" y="6" width="1" height="1" fill="#8B5E3C"/>
  <rect x="8" y="6" width="1" height="1" fill="#fff"/>
  <rect x="9" y="6" width="1" height="1" fill="#fff"/>
  <!-- above legs -->
  <rect x="6" y="7" width="1" height="1" fill="#8B5E3C"/>
  <rect x="7" y="7" width="1" height="1" fill="#8B5E3C"/>
  <!-- legs -->
  <rect x="5" y="8" width="1" height="1" fill="#FFB800"/>
  <rect x="8" y="8" width="1" height="1" fill="#FFB800"/>
</svg>
